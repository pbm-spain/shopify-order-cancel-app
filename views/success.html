<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cancellation Confirmed</title>
    <style nonce="{{NONCE}}">
      :root {
        --oc-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --oc-text: #111827;
        --oc-text-secondary: #6b7280;
        --oc-bg: #f3f4f6;
        --oc-bg-card: #ffffff;
        --oc-border: #d1d5db;
        --oc-success: #059669;
        --oc-radius: 12px;
        --oc-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.04);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--oc-font);
        background: var(--oc-bg);
        color: var(--oc-text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;        padding: 3rem 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .oc-card {
        background: var(--oc-bg-card);
        border: 1px solid var(--oc-border);
        border-radius: var(--oc-radius);
        padding: 2.5rem 2rem;
        max-width: 480px;
        width: 100%;
        box-shadow: var(--oc-shadow);
        text-align: center;
      }

      .oc-icon {
        width: 56px;
        height: 56px;
        background: var(--oc-success);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
      }

      .oc-icon svg {
        width: 26px;
        height: 26px;
        stroke: #fff;        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .oc-card h1 {
        font-size: 1.375rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      .oc-card p {
        font-size: 0.9375rem;
        color: var(--oc-text-secondary);
        line-height: 1.6;
        max-width: 38ch;
        margin: 0 auto;
      }

      @media (max-width: 480px) {
        body { padding: 1.5rem 0.75rem; }
        .oc-card { padding: 2rem 1.25rem; }
      }
    </style>
  </head>
  <body>
    <main class="oc-card" role="status">
      <div class="oc-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h1>Cancellation Confirmed</h1>
      <p>Your order has been successfully cancelled. If your store has notifications enabled, you'll receive a confirmation email shortly.</p>
    </main>
  </body>
</html>
