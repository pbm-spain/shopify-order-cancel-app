<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Cancellation</title>
    <style nonce="{{NONCE}}">
      :root {
        --oc-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --oc-radius: 12px;
        --oc-radius-sm: 8px;
        --oc-primary: #111827;
        --oc-primary-hover: #374151;
        --oc-border: #d1d5db;
        --oc-border-focus: #6366f1;
        --oc-text: #111827;
        --oc-text-secondary: #6b7280;
        --oc-bg: #f3f4f6;
        --oc-bg-card: #ffffff;
        --oc-error: #dc2626;
        --oc-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.04);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--oc-font);
        background: var(--oc-bg);
        color: var(--oc-text);        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 3rem 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .oc-card {
        background: var(--oc-bg-card);
        border: 1px solid var(--oc-border);
        border-radius: var(--oc-radius);
        padding: 2rem;
        max-width: 480px;
        width: 100%;
        box-shadow: var(--oc-shadow);
      }

      .oc-card h1 {
        font-size: 1.375rem;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 0.5rem;
      }

      .oc-intro {
        font-size: 0.9375rem;
        color: var(--oc-text-secondary);
        line-height: 1.6;        margin-bottom: 1.5rem;
      }

      .oc-field { margin-bottom: 1rem; }

      .oc-field label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 600;
        margin-bottom: 0.375rem;
        letter-spacing: 0.01em;
      }

      .oc-field input {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1px solid var(--oc-border);
        border-radius: var(--oc-radius-sm);
        font-family: var(--oc-font);
        font-size: 0.9375rem;
        color: var(--oc-text);
        background: var(--oc-bg-card);
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
        -webkit-appearance: none;
      }

      .oc-field input::placeholder { color: #9ca3af; }

      .oc-field input:focus {        border-color: var(--oc-border-focus);
        box-shadow: 0 0 0 3px rgba(99,102,241,.15);
      }

      .oc-error {
        display: none;
        color: var(--oc-error);
        font-size: 0.8125rem;
        margin-top: 0.375rem;
      }

      .oc-submit {
        display: block;
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.75rem 1.25rem;
        background: var(--oc-primary);
        color: #fff;
        border: none;
        border-radius: var(--oc-radius-sm);
        font-family: var(--oc-font);
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }

      .oc-submit:hover { background: var(--oc-primary-hover); }
      .oc-submit:focus-visible { outline: 2px solid var(--oc-border-focus); outline-offset: 2px; }      .oc-submit:disabled { opacity: 0.5; cursor: not-allowed; }

      .oc-footnote {
        text-align: center;
        font-size: 0.8125rem;
        color: var(--oc-text-secondary);
        margin-top: 1rem;
      }

      @media (max-width: 480px) {
        body { padding: 1.5rem 0.75rem; }
        .oc-card { padding: 1.5rem 1.25rem; }
      }
    </style>
  </head>
  <body>
    <main class="oc-card">
      <h1>Request Order Cancellation</h1>
      <p class="oc-intro">Enter the email address and order number associated with your purchase. We'll send you a confirmation email to complete the cancellation.</p>

      <form method="post" action="/apps/order-cancel/request" id="cancelForm" novalidate>
        <input type="hidden" name="_csrf" value="{{CSRF_TOKEN}}" />

        <div class="oc-field">
          <label for="oc-email">Email Address</label>
          <input id="oc-email" name="email" type="email" required autocomplete="email" placeholder="you@example.com" />
        </div>

        <div class="oc-field">          <label for="oc-order">Order Number</label>
          <input id="oc-order" name="orderNumber" type="text" placeholder="#1001" required
                 pattern="#[1-9]\d{0,18}"
                 title="Order number must start with # followed by digits (e.g. #1001)" />
          <div class="oc-error" id="orderError" role="alert">Please enter a valid order number (e.g. #1001)</div>
        </div>

        <button type="submit" class="oc-submit" id="submitBtn">Send Confirmation Email</button>
      </form>

      <p class="oc-footnote">Cancellation is only available for orders that have not yet shipped.</p>
    </main>

    <script nonce="{{NONCE}}">
      (function() {
        var form = document.getElementById('cancelForm');
        var orderInput = document.getElementById('oc-order');
        var orderError = document.getElementById('orderError');
        var submitBtn = document.getElementById('submitBtn');

        orderInput.addEventListener('input', function() {
          var val = orderInput.value.trim();
          var valid = /^#[1-9]\d{0,18}$/.test(val);
          orderError.style.display = val && !valid ? 'block' : 'none';
        });

        form.addEventListener('submit', function() {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Sending\u2026';
        });
      })();
    </script>
  </body>
</html>
